<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#1a0533"/>
      <stop offset="100%" stop-color="#0a0a0f"/>
    </radialGradient>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff0080"/>
      <stop offset="50%" stop-color="#8000ff"/>
      <stop offset="100%" stop-color="#0080ff"/>
    </linearGradient>
    <linearGradient id="grad2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#00ffcc"/>
      <stop offset="50%" stop-color="#ff8800"/>
      <stop offset="100%" stop-color="#ff0044"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Grid cells -->
  <rect x="32" y="32" width="210" height="210" rx="18" fill="#1a1a2e" opacity="0.7"/>
  <rect x="270" y="32" width="210" height="210" rx="18" fill="#1a1a2e" opacity="0.7"/>
  <rect x="32" y="270" width="210" height="210" rx="18" fill="#1a1a2e" opacity="0.7"/>
  <rect x="270" y="270" width="210" height="210" rx="18" fill="#1a1a2e" opacity="0.7"/>
  <!-- Glowing tiles -->
  <rect x="38" y="38" width="198" height="198" rx="14" fill="url(#grad1)" filter="url(#glow)" opacity="0.95"/>
  <rect x="276" y="276" width="198" height="198" rx="14" fill="url(#grad2)" filter="url(#glow)" opacity="0.95"/>
  <!-- Text on tiles -->
  <text x="137" y="168" font-family="'Arial Black', sans-serif" font-size="90" font-weight="900" fill="white" text-anchor="middle" filter="url(#glow)">20</text>
  <text x="375" y="406" font-family="'Arial Black', sans-serif" font-size="90" font-weight="900" fill="white" text-anchor="middle" filter="url(#glow)">48</text>
  <!-- RGB accent dots -->
  <circle cx="375" cy="137" r="28" fill="#ff0080" opacity="0.9" filter="url(#glow)"/>
  <circle cx="137" cy="375" r="28" fill="#00ffcc" opacity="0.9" filter="url(#glow)"/>
</svg>
